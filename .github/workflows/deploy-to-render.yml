name: Deploy to Render

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Render deploy via webhook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Set RENDER_DEPLOY_HOOK_URL in repository secrets.";
            exit 1;
          fi
          echo "Triggering Render deploy via webhook"
          curl -s -X POST "$RENDER_DEPLOY_HOOK_URL" -H "Content-Type: application/json" -d '{}' || true
